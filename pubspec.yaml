name: annya_nissaya
description: "Annya Nissaya"
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.1+2

environment:
  sdk: ">=2.16.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  freezed_annotation: ^2.4.1
  flutter_riverpod: ^2.3.7
  vs_scrollbar: ^0.2.0
  shared_preferences: ^2.0.5
  enum_to_string: ^2.0.1
  flutter_markdown: ^0.6.1
  grouped_list: ^5.1.2
  scrollable_positioned_list: ^0.3.8
  path_provider: ^2.0.8
  path: ^1.8.0
  logger: ^2.0.2+1
  cupertino_icons: ^1.0.2
  flutter_widget_from_html_core: ^0.14.11
  sqflite: ^2.1.0
  sqflite_common_ffi: ^2.1.1+1
  # sqlite3_flutter_libs:
  asset_pdf_viewer:
    path: packages/asset_pdf_viewer_mobile
    # path: packages/asset_pdf_viewer_desktop
  # app_links: ^3.2.0
  # url_protocol: ^1.0.0
  uni_links_desktop: ^0.1.3
  uni_links: ^0.5.1
  easy_debounce: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3
  json_serializable: ^6.1.4
  freezed: ^2.4.1
  msix: ^3.6.2
  build_runner:

flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  assets:
    - assets/database/annya_nsy.db
    - assets/books/cover/
    - assets/books/pdf/
    - assets/info.html

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  remove_alpha_ios: true
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/icon/icon.png"
